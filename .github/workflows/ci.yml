name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Syntax & Import Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install rich click prompt_toolkit pyserial pycryptodome protobuf
      - name: Syntax check all Python files
        run: |
          find . -name "*.py" \
            ! -path "./.git/*" \
            ! -path "*/__pycache__/*" \
            ! -path "*/watchrom_repos/*" \
            -print0 | xargs -0 python -m py_compile
          echo "All .py files pass syntax check"
      - name: Import check — core framework
        run: |
          python - << 'EOF'
          import sys; sys.path.insert(0, '.')
          mods = ['core','core.interfaces','core.registry',
                  'core.pipeline','core.vendors','core.band_backends']
          errors = []
          for m in mods:
              try: __import__(m); print(f"  OK  {m}")
              except Exception as e: print(f"  FAIL {m}: {e}"); errors.append(m)
          if errors: sys.exit(1)
          print(f"Core framework: {len(mods)}/{len(mods)} OK")
          EOF
      - name: Import check — all modules
        run: |
          python - << 'EOF'
          import sys; sys.path.insert(0, '.')
          mods = [
              'modules.device','modules.partition','modules.bootimg',
              'modules.root','modules.wearos','modules.sysimg','modules.avb',
              'modules.ota','modules.rom','modules.apk','modules.twrp',
              'modules.devtree','modules.dtb','modules.props','modules.sepolicy',
              'modules.magisk','modules.keys','modules.analyze','modules.diag',
              'modules.network','modules.backup','modules.chipset',
              'modules.rk_aw_rtk','modules.qualcomm','modules.qualcomm_chips',
              'modules.modem_bands','modules.pipeline_cmd',
              'modules.adb_cmds','modules.chipsets',
          ]
          errors = []
          for m in mods:
              try: __import__(m); print(f"  OK  {m}")
              except Exception as e: print(f"  FAIL {m}: {e}"); errors.append(m)
          if errors: print(f"FAILED: {errors}"); sys.exit(1)
          print(f"Modules: {len(mods)}/{len(mods)} OK")
          EOF

  test:
    name: Functional Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install rich click prompt_toolkit pyserial pycryptodome protobuf
          sudo apt-get update -qq
          sudo apt-get install -y -qq e2fsprogs device-tree-compiler 2>/dev/null || true
      - name: Run functional tests
        run: python3 tests/run_tests.py

  chip-db:
    name: Chip Database Integrity
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install rich click prompt_toolkit pyserial pycryptodome protobuf
      - name: Verify chip database
        run: |
          python - << 'EOF'
          import sys; sys.path.insert(0, '.')
          from modules.chipsets import (MTK_CHIPS, UNISOC_CHIPS, ROCKCHIP_CHIPS,
                                         ALLWINNER_CHIPS, REALTEK_CHIPS)
          from modules.qualcomm_chips import SNAPDRAGON_CHIPS
          total = sum(len(d) for d in [MTK_CHIPS,UNISOC_CHIPS,ROCKCHIP_CHIPS,
                                        ALLWINNER_CHIPS,REALTEK_CHIPS,SNAPDRAGON_CHIPS])
          assert total >= 137, f"Expected >=137 chips, got {total}"
          print(f"Chip database: {total} chips across 6 vendors - OK")
          from modules.modem_bands import CARRIER_PROFILES
          assert len(CARRIER_PROFILES) >= 16
          for name, p in CARRIER_PROFILES.items():
              int(p['lte_hex_low'], 16)
              int(p['nr_hex'], 16)
          print(f"Carrier profiles: {len(CARRIER_PROFILES)} valid - OK")
          EOF
